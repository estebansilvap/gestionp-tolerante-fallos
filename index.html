<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Pedidos</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>

  <div class="app">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h1><i class="ti ti-package" aria-hidden="true"></i>Gestión de pedidos</h1>
        <p>Panel de control y administración</p>
      </div>
    </div>

    <!-- Métricas -->
    <div class="metrics" id="metrics"></div>

    <!-- Barra de herramientas -->
    <div class="toolbar">
      <input type="text" id="search" placeholder="Buscar por cliente o producto..." oninput="render()" />
      <select id="filter-state" onchange="render()">
        <option value="">Todos los estados</option>
        <option value="Pendiente">Pendiente</option>
        <option value="Procesando">Procesando</option>
        <option value="Enviado">Enviado</option>
        <option value="Entregado">Entregado</option>
        <option value="Cancelado">Cancelado</option>
      </select>
      <button class="btn btn-primary" onclick="openCreate()">
        <i class="ti ti-plus" aria-hidden="true"></i> Nuevo pedido
      </button>
    </div>

    <!-- Tabla -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-id" onclick="sortBy('id')"># <i class="ti ti-selector" aria-hidden="true"></i></th>
            <th class="col-customer" onclick="sortBy('customer')">Cliente <i class="ti ti-selector" aria-hidden="true"></i></th>
            <th class="col-product" onclick="sortBy('product')">Producto <i class="ti ti-selector" aria-hidden="true"></i></th>
            <th class="col-amount" onclick="sortBy('amount')">Monto <i class="ti ti-selector" aria-hidden="true"></i></th>
            <th class="col-state" onclick="sortBy('state')">Estado <i class="ti ti-selector" aria-hidden="true"></i></th>
            <th class="col-date" onclick="sortBy('start_date')">Fecha <i class="ti ti-selector" aria-hidden="true"></i></th>
            <th class="col-actions">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

      <!-- Paginación -->
      <div class="pagination">
        <span id="pag-info"></span>
        <div class="page-btns" id="pag-btns"></div>
      </div>
    </div>

  </div>

  <!-- Contenedor de modal -->
  <div id="modal-container"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
